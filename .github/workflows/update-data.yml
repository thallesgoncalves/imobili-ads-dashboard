name: Update campaign data

on:
  schedule:
    # 09:00 America/Maceio (UTC-3) = 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch campaign data from Meta Marketing API
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: node scripts/fetch_data.js

      - name: Fetch leads from Contact2Sale
        env:
          C2S_API_TOKEN: ${{ secrets.C2S_API_TOKEN }}
        run: node scripts/fetch_c2s.js

      - name: Fetch channels and creatives from Meta Marketing API
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: node scripts/fetch_creatives.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/campaigns.json data/c2s.json data/creatives.json
          git diff --quiet --cached || git commit -m "chore: atualizar dados de campanhas"
          git push
