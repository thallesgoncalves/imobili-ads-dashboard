<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Imobili Consultoria — Dashboard de Campanhas</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="viz-root" data-theme="">

  <header class="topbar">
    <div class="topbar-title">
      <h1>Dashboard de Campanhas</h1>
      <p class="subtitle">Imobili Consultoria · Meta Ads</p>
    </div>
    <div class="topbar-meta">
      <span id="updated-at" class="muted">Carregando…</span>
    </div>
  </header>

  <div class="filters" role="group" aria-label="Filtros">
    <div class="filter-group" id="range-filter" role="group" aria-label="Período">
      <button type="button" data-range="7">7 dias</button>
      <button type="button" data-range="30" class="active">30 dias</button>
      <button type="button" data-range="90">90 dias</button>
    </div>
    <label class="filter-select">
      <span class="visually-hidden">Conta</span>
      <select id="account-filter">
        <option value="all">Todas as contas</option>
      </select>
    </label>
  </div>

  <section class="kpi-row" id="kpi-row" aria-label="Indicadores principais">
    <!-- stat tiles injected here -->
  </section>

  <section class="charts-row">
    <div class="chart-card">
      <div class="chart-head">
        <h2>Investimento por dia</h2>
      </div>
      <div class="chart-wrap" id="chart-spend"></div>
    </div>
    <div class="chart-card">
      <div class="chart-head">
        <h2>Leads por dia</h2>
      </div>
      <div class="chart-wrap" id="chart-leads"></div>
    </div>
  </section>

  <section class="table-card">
    <div class="chart-head">
      <h2>Campanhas</h2>
      <span class="muted" id="table-count"></span>
    </div>
    <div class="table-scroll">
      <table id="campaign-table">
        <thead>
          <tr>
            <th data-sort="account">Conta</th>
            <th data-sort="campaign">Campanha</th>
            <th data-sort="spend" class="num sorted-desc">Investimento</th>
            <th data-sort="impressions" class="num">Impressões</th>
            <th data-sort="clicks" class="num">Cliques</th>
            <th data-sort="ctr" class="num">CTR</th>
            <th data-sort="leads" class="num">Leads</th>
            <th data-sort="cost_per_lead" class="num">Custo/Lead</th>
          </tr>
        </thead>
        <tbody id="campaign-tbody"></tbody>
      </table>
    </div>
  </section>

  <footer class="page-footer">
    <span class="muted">Fonte: Windsor.ai (Meta Ads) · atualizado automaticamente 1×/dia via GitHub Actions</span>
  </footer>

</div>
<script src="app.js"></script>
</body>
</html>
